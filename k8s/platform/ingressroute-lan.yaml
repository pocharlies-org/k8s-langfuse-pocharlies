---
# LAN access to the Langfuse UI via traefik-lan (internal LoadBalancer 192.168.50.240),
# no Cloudflare/edge involved. Langfuse's own NextAuth login is the auth (no SSO
# middleware — same as litellm-lan). traefik-lan watches all namespaces, so this route
# lives in the app's own namespace next to langfuse-web (no ExternalName needed).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: langfuse-lan
  namespace: langfuse
  annotations:
    external-dns.alpha.kubernetes.io/hostname: langfuse.lan.e-dani.com
    external-dns.alpha.kubernetes.io/target: 192.168.50.240
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`langfuse.lan.e-dani.com`)
      kind: Rule
      services:
        - name: langfuse-web
          port: 3000
  tls:
    store: { name: default, namespace: traefik-lan }
