# Langfuse app secrets, materialised from Vault via External Secrets Operator.
# Store:  ClusterSecretStore `vault-backend`  (KV v2, mount `secret`)
# Path:   secret/langfuse   (flat, per-field `property:` — same convention as secret/litellm)
#
# Seed the Vault path BEFORE first sync (see README §Secretos):
#   vault kv put secret/langfuse \
#     SALT=...  ENCRYPTION_KEY=...  NEXTAUTH_SECRET=... \
#     DB_USER=langfuse  DB_PASSWORD=...  REDIS_PASSWORD=...  CLICKHOUSE_PASSWORD=... \
#     S3_ACCESS_KEY_ID=...  S3_SECRET_ACCESS_KEY=... \
#     INIT_PROJECT_PUBLIC_KEY=pk-lf-...  INIT_PROJECT_SECRET_KEY=sk-lf-... \
#     INIT_USER_EMAIL=me@e-dani.com  INIT_USER_PASSWORD=...
#
# sync-wave -5: create the Secret before the chart's web/worker pods start.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-secrets
  namespace: langfuse
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: langfuse-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: salt
      remoteRef: { key: secret/langfuse, property: SALT }
    - secretKey: encryption-key
      remoteRef: { key: secret/langfuse, property: ENCRYPTION_KEY }
    - secretKey: nextauth-secret
      remoteRef: { key: secret/langfuse, property: NEXTAUTH_SECRET }
    - secretKey: postgres-password
      remoteRef: { key: secret/langfuse, property: DB_PASSWORD }
    - secretKey: redis-password
      remoteRef: { key: secret/langfuse, property: REDIS_PASSWORD }
    - secretKey: clickhouse-password
      remoteRef: { key: secret/langfuse, property: CLICKHOUSE_PASSWORD }
    - secretKey: s3-access-key-id
      remoteRef: { key: secret/langfuse, property: S3_ACCESS_KEY_ID }
    - secretKey: s3-secret-access-key
      remoteRef: { key: secret/langfuse, property: S3_SECRET_ACCESS_KEY }
    - secretKey: init-project-public-key
      remoteRef: { key: secret/langfuse, property: INIT_PROJECT_PUBLIC_KEY }
    - secretKey: init-project-secret-key
      remoteRef: { key: secret/langfuse, property: INIT_PROJECT_SECRET_KEY }
    - secretKey: init-user-email
      remoteRef: { key: secret/langfuse, property: INIT_USER_EMAIL }
    - secretKey: init-user-password
      remoteRef: { key: secret/langfuse, property: INIT_USER_PASSWORD }
