---
# Langfuse trace retention (48h). OSS carece de retención nativa (es EE-gated), así que
# un CronJob diario borra las trazas más antiguas que RETENTION_DAYS vía el API público.
# El borrado CASCADEA: elimina observations/scores en ClickHouse y los blobs S3 (MinIO).
# Idempotente: primero COLECTA todos los ids expirados (paginando por número de página),
# luego borra en lotes — evita el problema de borrar-mientras-paginas.
# Motivo PII: content-logging está ON → los mensajes de cliente viven en las trazas; cap 48h.
# (El otro store de PII, spend-logs de litellm, ya se auto-purga a 30d en su config.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-retention-script
  namespace: langfuse
data:
  retention.js: |
    const HOST = process.env.LANGFUSE_HOST || 'http://langfuse-web:3000';
    const DAYS = parseInt(process.env.RETENTION_DAYS || '2', 10);
    const DRY = process.env.DRY_RUN === 'true';
    const auth = 'Basic ' + Buffer.from(process.env.PK + ':' + process.env.SK).toString('base64');
    const H = { Authorization: auth, 'Content-Type': 'application/json' };
    const cutoff = new Date(Date.now() - DAYS * 86400000).toISOString();
    const MAX_PAGES = 2000; // tope de seguridad ~200k trazas/ejecución
    (async () => {
      const ids = [];
      for (let page = 1; page <= MAX_PAGES; page++) {
        const r = await fetch(`${HOST}/api/public/traces?toTimestamp=${encodeURIComponent(cutoff)}&limit=100&page=${page}`, { headers: H });
        if (!r.ok) { console.error('list failed', r.status, await r.text()); process.exit(1); }
        const j = await r.json();
        const batch = (j.data || []).map(t => t.id);
        if (!batch.length) break;
        ids.push(...batch);
        if (page === MAX_PAGES) console.warn('MAX_PAGES cap alcanzado; quedan trazas para la próxima ejecución');
      }
      console.log(`cutoff=${cutoff} days=${DAYS} expired=${ids.length} dryRun=${DRY}`);
      if (DRY || !ids.length) { console.log('nada que borrar (dry o vacío)'); return; }
      let deleted = 0;
      for (let i = 0; i < ids.length; i += 100) {
        const chunk = ids.slice(i, i + 100);
        const d = await fetch(`${HOST}/api/public/traces`, { method: 'DELETE', headers: H, body: JSON.stringify({ traceIds: chunk }) });
        if (!d.ok) { console.error('delete failed', d.status, await d.text()); process.exit(1); }
        deleted += chunk.length;
      }
      console.log(`retention done: deleted=${deleted}`);
    })().catch(e => { console.error('ERR', e && e.message); process.exit(1); });
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: langfuse-retention
  namespace: langfuse
spec:
  schedule: "0 4 * * *"        # diario 04:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: retention        # coincide con la NetworkPolicy egress interna del ns
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: retention
              image: langfuse/langfuse:3.205.1   # trae node20 (global fetch); script solo usa built-ins
              command: ["node", "/scripts/retention.js"]
              env:
                - name: LANGFUSE_HOST
                  value: "http://langfuse-web:3000"
                - name: RETENTION_DAYS
                  value: "2"
                - name: PK
                  valueFrom: { secretKeyRef: { name: langfuse-secrets, key: init-project-public-key } }
                - name: SK
                  valueFrom: { secretKeyRef: { name: langfuse-secrets, key: init-project-secret-key } }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { memory: 512Mi }
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: langfuse-retention-script
---
# Langfuse migrations own these tables and may replace their DDL. Re-apply the
# 48-hour TTL daily so a chart/app upgrade cannot silently restore unlimited
# history. The API retention job above remains responsible for cascade deletion
# of associated object-store blobs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-clickhouse-retention-sql
  namespace: langfuse
data:
  retention.sql: |
    ALTER TABLE default.observations MODIFY TTL toDateTime(start_time) + toIntervalHour(48);
    ALTER TABLE default.traces MODIFY TTL toDateTime(timestamp) + toIntervalHour(48);
    ALTER TABLE default.scores MODIFY TTL toDateTime(timestamp) + toIntervalHour(48);
    ALTER TABLE default.blob_storage_file_log MODIFY TTL toDateTime(created_at) + toIntervalHour(48);
    ALTER TABLE default.dataset_run_items MODIFY TTL toDateTime(created_at) + toIntervalHour(48);
    ALTER TABLE default.dataset_run_items_rmt MODIFY TTL toDateTime(created_at) + toIntervalHour(48);
    ALTER TABLE default.event_log MODIFY TTL toDateTime(created_at) + toIntervalHour(48);
    ALTER TABLE system.asynchronous_metric_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.error_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.metric_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.opentelemetry_span_log MODIFY TTL finish_date + toIntervalDay(2);
    ALTER TABLE system.part_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.processors_profile_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.query_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.text_log MODIFY TTL event_date + toIntervalDay(2);
    ALTER TABLE system.trace_log MODIFY TTL event_date + toIntervalDay(2);
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: langfuse-clickhouse-retention
  namespace: langfuse
spec:
  schedule: "30 3 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: retention
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: clickhouse-retention
              image: docker.io/bitnamilegacy/clickhouse:25.2.1-debian-12-r0
              command: ["/bin/bash", "-ec"]
              args:
                - >-
                  clickhouse-client
                  --host langfuse-clickhouse
                  --user "$CLICKHOUSE_USER"
                  --password "$CLICKHOUSE_PASSWORD"
                  --multiquery < /scripts/retention.sql
              env:
                - name: CLICKHOUSE_USER
                  value: "default"
                - name: CLICKHOUSE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: langfuse-secrets
                      key: clickhouse-password
              resources:
                requests: { cpu: 25m, memory: 64Mi }
                limits: { memory: 256Mi }
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: langfuse-clickhouse-retention-sql
